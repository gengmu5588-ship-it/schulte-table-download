<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="舒尔特方格 - 专注力训练神器，提升注意力与阅读速度">
    <meta name="keywords" content="舒尔特方格,注意力训练,专注力,速读训练">
    <title>舒尔特方格 - 专注力训练神器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --accent: #22c55e;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1a2e 50%, #16213e 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* 动态背景网格 */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
            background-image: 
                linear-gradient(var(--primary) 1px, transparent 1px),
                linear-gradient(90deg, var(--primary) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        /* 浮动粒子 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary-light);
            border-radius: 50%;
            opacity: 0.6;
            animation: float 8s ease-in-out infinite;
        }

        .particle:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { top: 20%; left: 80%; animation-delay: 1s; }
        .particle:nth-child(3) { top: 40%; left: 30%; animation-delay: 2s; }
        .particle:nth-child(4) { top: 60%; left: 70%; animation-delay: 3s; }
        .particle:nth-child(5) { top: 80%; left: 50%; animation-delay: 4s; }
        .particle:nth-child(6) { top: 30%; left: 60%; animation-delay: 1.5s; }
        .particle:nth-child(7) { top: 70%; left: 25%; animation-delay: 2.5s; }
        .particle:nth-child(8) { top: 50%; left: 85%; animation-delay: 3.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
            50% { transform: translateY(-30px) scale(1.5); opacity: 0.9; }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Logo区域 */
        .logo-section {
            text-align: center;
            padding: 20px 0 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .app-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 
                0 20px 40px rgba(99, 102, 241, 0.4),
                0 0 0 4px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .app-icon::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255, 255, 255, 0.1) 50%,
                transparent 70%
            );
            animation: shine 3s ease-in-out infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .app-icon svg {
            width: 64px;
            height: 64px;
            stroke: white;
            stroke-width: 2;
            fill: none;
        }

        /* 舒尔特方格网格图标 */
        .grid-icon {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            width: 64px;
            height: 64px;
        }

        .grid-icon span {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--primary-dark);
            animation: gridPulse 2s ease-in-out infinite;
        }

        .grid-icon span:nth-child(1) { animation-delay: 0s; }
        .grid-icon span:nth-child(2) { animation-delay: 0.1s; }
        .grid-icon span:nth-child(3) { animation-delay: 0.2s; }
        .grid-icon span:nth-child(4) { animation-delay: 0.3s; }
        .grid-icon span:nth-child(5) { animation-delay: 0.4s; }
        .grid-icon span:nth-child(6) { animation-delay: 0.5s; }
        .grid-icon span:nth-child(7) { animation-delay: 0.6s; }
        .grid-icon span:nth-child(8) { animation-delay: 0.7s; }
        .grid-icon span:nth-child(9) { animation-delay: 0.8s; }

        @keyframes gridPulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        .app-name {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            text-shadow: 0 4px 20px rgba(99, 102, 241, 0.5);
        }

        .app-tagline {
            font-size: 16px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* 特性卡片 */
        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 32px;
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feature-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: var(--primary);
        }

        .feature-card:hover::before {
            opacity: 1;
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 20px;
            color: white;
        }

        .feature-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .feature-desc {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* 统计数据 */
        .stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out 0.5s both;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* 下载按钮区域 */
        .download-section {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px;
            background: linear-gradient(180deg, transparent 0%, var(--bg-dark) 30%);
            z-index: 10;
            animation: slideUp 0.5s ease-out 0.7s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(100%);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .download-wrapper {
            max-width: 480px;
            margin: 0 auto;
        }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 32px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 10px 30px rgba(99, 102, 241, 0.4),
                0 0 0 0 rgba(99, 102, 241, 0.4);
            position: relative;
            overflow: hidden;
        }

        .download-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: left 0.5s ease;
        }

        .download-btn:hover::before {
            left: 100%;
        }

        .download-btn:hover {
            transform: scale(1.02);
            box-shadow: 
                0 15px 40px rgba(99, 102, 241, 0.5),
                0 0 0 8px rgba(99, 102, 241, 0.1);
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        .download-icon {
            width: 24px;
            height: 24px;
        }

        .download-info {
            text-align: center;
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .download-info span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin: 0 8px;
        }

        /* 版本信息 */
        .version-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(34, 197, 94, 0.2);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 8px;
        }

        /* 底部信息 */
        .footer-info {
            text-align: center;
            padding: 80px 24px 100px;
            animation: fadeIn 1s ease-out 0.9s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .footer-info p {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.8;
        }

        .footer-info a {
            color: var(--primary-light);
            text-decoration: none;
        }

        /* 安全提示 */
        .security-tip {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
            margin: 16px 0;
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }

        .security-tip svg {
            width: 16px;
            height: 16px;
            color: var(--accent);
        }

        .security-tip span {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 响应式 */
        @media (max-width: 360px) {
            .app-icon {
                width: 100px;
                height: 100px;
            }

            .app-name {
                font-size: 28px;
            }

            .features {
                grid-template-columns: 1fr;
            }

            .stats {
                gap: 24px;
            }

            .stat-value {
                font-size: 24px;
            }
        }

        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(99, 102, 241, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- 动态背景 -->

    <!-- 下载按钮 -->

                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>

                        <circle cx="12" cy="12" r="10"/>

                    快速下载
                </span>
            </div>
        </div>
    </div>

    <script>
        // 页面加载完成后隐藏加载动画
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loader').classList.add('hidden');
            }, 500);
        });

        // 下载功能
        function downloadApp() {
            const downloadUrl = 'http://www.set.tbaosearch.asia/schulte-table.apk';
            
            // 添加点击反馈
            const btn = document.querySelector('.download-btn');
            btn.style.transform = 'scale(0.95)';
            
            setTimeout(function() {
                btn.style.transform = '';
                
                // 创建下载链接
                const link = document.createElement('a');
                link.href = downloadUrl;
                link.download = 'schulte-table.apk';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                // 显示下载提示
                showDownloadTip();
            }, 100);
        }

        // 下载提示
        function showDownloadTip() {
            const tip = document.createElement('div');
            tip.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(34, 197, 94, 0.9);
                color: white;
                padding: 16px 24px;
                border-radius: 12px;
                font-size: 14px;
                font-weight: 500;
                z-index: 1000;
                animation: fadeInOut 3s ease forwards;
            `;
            tip.textContent = '✓ 下载已开始，请稍候...';
            document.body.appendChild(tip);
            
            setTimeout(function() {
                tip.remove();
            }, 3000);
        }

        // 动态添加动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInOut {
                0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
                20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
                80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
                100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
